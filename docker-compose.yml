version: "3.9"

services:
  backend:
    build:
      context: .
      target: backend
    ports:
      - "5000:5000"
    env_file: .env
    restart: unless-stopped

  frontend:
    build:
      context: .
      target: frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
